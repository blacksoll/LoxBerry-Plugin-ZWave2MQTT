name: Release sanity check

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin metadata exists
        run: |
          test -f plugin.cfg
          test -f README.md
          test -d webfrontend
      - name: Show version
        run: awk -F= '/^VERSION=/{print $2}' plugin.cfg
